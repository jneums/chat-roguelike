services:
  # Game server (Colyseus WebSocket)
  - type: web
    name: chat-roguelike-server
    runtime: node
    region: oregon
    buildCommand: npm install && npm run build -w shared && npm run build -w server
    startCommand: node server/dist/index.js
    envVars:
      - key: NODE_ENV
        value: production
    healthCheckPath: /matchmake/
    autoDeploy: true

  # Frontend (Vite static build)
  - type: web
    name: chat-roguelike-client
    runtime: static
    buildCommand: npm install && npm run build -w shared && npm run build -w client
    staticPublishPath: client/dist
    headers:
      - path: /*
        name: Cache-Control
        value: no-cache
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    autoDeploy: true
